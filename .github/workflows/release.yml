name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS DMGs
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # Build WITHOUT any code signing — Tauri skips codesign when
      # APPLE_SIGNING_IDENTITY is unset. We then manually re-sign using
      # plain ad-hoc (no --options runtime) so macOS accepts the binary
      # after Homebrew strips the quarantine flag.
      - name: Build Apple Silicon
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Build Intel
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Re-sign without hardened runtime & repackage DMGs
        id: dmgs
        run: |
          VERSION="${GITHUB_REF_NAME}"

          ARM_APP=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" | head -1)
          X86_APP=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos  -name "*.app" | head -1)

          # Inject macOS usage description strings into Info.plist.
          # Tauri doesn't support these via config, so we patch after build.
          # These are required for macOS to show the mic permission dialog.
          for APP in "$ARM_APP" "$X86_APP"; do
            PLIST="$APP/Contents/Info.plist"
            /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'Soll needs microphone access to transcribe your speech locally.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'Soll needs microphone access to transcribe your speech locally.'" "$PLIST"
            /usr/libexec/PlistBuddy -c "Add :NSAppleEventsUsageDescription string 'Soll uses AppleScript to paste transcribed text into the focused app.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSAppleEventsUsageDescription 'Soll uses AppleScript to paste transcribed text into the focused app.'" "$PLIST"
          done

          # Strip any existing signature, then re-sign ad-hoc without
          # --options runtime (hardened runtime). This avoids the
          # "can't be opened" error on unsigned Macs.
          codesign --remove-signature "$ARM_APP" 2>/dev/null || true
          codesign --remove-signature "$X86_APP" 2>/dev/null || true
          codesign --force --deep --sign - "$ARM_APP"
          codesign --force --deep --sign - "$X86_APP"

          # Package each app into a DMG
          ARM_OUT="Soll-${VERSION}-apple-silicon.dmg"
          X86_OUT="Soll-${VERSION}-intel.dmg"

          hdiutil create -volname "Soll" -srcfolder "$ARM_APP" -ov -format UDZO "$ARM_OUT"
          hdiutil create -volname "Soll" -srcfolder "$X86_APP" -ov -format UDZO "$X86_OUT"

          ARM_SHA=$(shasum -a 256 "$ARM_OUT" | awk '{print $1}')
          X86_SHA=$(shasum -a 256 "$X86_OUT" | awk '{print $1}')

          echo "arm_dmg=$ARM_OUT"        >> "$GITHUB_OUTPUT"
          echo "x86_dmg=$X86_OUT"        >> "$GITHUB_OUTPUT"
          echo "arm_sha=$ARM_SHA"        >> "$GITHUB_OUTPUT"
          echo "x86_sha=$X86_SHA"        >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}"    >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Soll ${{ github.ref_name }}"
          draft: false
          generate_release_notes: true
          body: |
            ## Install via Homebrew (recommended)

            ```bash
            brew tap mithun-builds/soll
            brew install --cask soll
            ```

            ## Manual install
            1. Download the DMG for your Mac:
               - **Apple Silicon** (M1/M2/M3/M4) → `Soll-*-apple-silicon.dmg`
               - **Intel** → `Soll-*-intel.dmg`
            2. Open the DMG → drag **Soll.app** to **Applications**
            3. **System Settings → Privacy & Security** → scroll down → **Open Anyway**

            ## Requirements
            - macOS 13 Ventura or later
            - Microphone + Accessibility permissions (prompted on first use)
            - [Ollama](https://ollama.com) *(optional — for AI cleanup and Skills)*
          files: |
            ${{ steps.dmgs.outputs.arm_dmg }}
            ${{ steps.dmgs.outputs.x86_dmg }}

      - name: Update Homebrew Cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.dmgs.outputs.version }}
          ARM_SHA: ${{ steps.dmgs.outputs.arm_sha }}
          X86_SHA: ${{ steps.dmgs.outputs.x86_sha }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/mithun-builds/homebrew-soll.git tap
          cat > tap/Casks/soll.rb << EOF
          cask "soll" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/mithun-builds/soll/releases/download/v#{version}/Soll-v#{version}-apple-silicon.dmg"
              sha256 "${ARM_SHA}"
            end

            on_intel do
              url "https://github.com/mithun-builds/soll/releases/download/v#{version}/Soll-v#{version}-intel.dmg"
              sha256 "${X86_SHA}"
            end

            name "Soll"
            desc "Voice to text for your Mac — local, private, free"
            homepage "https://mithun-builds.github.io/soll/"

            app "Soll.app"

            # Remove quarantine flag so macOS opens the app without Gatekeeper warnings
            postflight do
              system_command "/usr/bin/xattr",
                args: ["-dr", "com.apple.quarantine", "#{appdir}/Soll.app"],
                sudo: false
            end

            # Brew runs this on \`uninstall --cask\` AND on \`upgrade --cask\`
            # (upgrade is uninstall-then-install under the hood). Quitting the
            # running app first means the user can run \`brew upgrade --cask soll\`
            # while Soll is open and brew handles it cleanly.
            uninstall quit: "com.soll.app"

            zap trash: [
              "~/Library/Application Support/com.soll.app",
              "~/Library/Preferences/com.soll.app.plist",
              "~/Library/Logs/com.soll.app",
            ]
          end
          EOF
          cd tap
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add Casks/soll.rb
          git commit -m "Update soll to ${VERSION}"
          git push
