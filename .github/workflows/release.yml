name: Release

# Triggered when you push a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  release-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write   # needed to upload release assets

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ─────────────────────────────────────────────────────
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      # ── Rust cache ─────────────────────────────────────────────────────────
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Node + pnpm ────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # ── Build Apple Silicon DMG ────────────────────────────────────────────
      - name: Build (arm64)
        run: pnpm tauri build --target aarch64-apple-darwin
        env:
          # Skip code-signing for unsigned open-source builds.
          # Users will right-click → Open the first time.
          APPLE_SIGNING_IDENTITY: '-'

      # ── Build Intel DMG ────────────────────────────────────────────────────
      - name: Build (x86_64)
        run: pnpm tauri build --target x86_64-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: '-'

      # ── Rename artifacts ───────────────────────────────────────────────────
      - name: Collect DMGs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARM_DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          X86_DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg  -name "*.dmg" | head -1)
          cp "$ARM_DMG" "Soll-${VERSION}-apple-silicon.dmg"
          cp "$X86_DMG" "Soll-${VERSION}-intel.dmg"
          ls -lh Soll-*.dmg

      # ── Create GitHub Release with DMGs attached ───────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Soll ${{ github.ref_name }}"
          draft: true          # you review before publishing
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install

            1. Download the DMG for your Mac:
               - **Apple Silicon** (M1/M2/M3/M4) → `Soll-*-apple-silicon.dmg`
               - **Intel** → `Soll-*-intel.dmg`
            2. Open the DMG and drag **Soll.app** to your **Applications** folder.
            3. First launch: right-click → **Open** to bypass Gatekeeper (unsigned build).

            ## Requirements
            - macOS 13 Ventura or later
            - Microphone permission (Soll will prompt on first use)
            - Accessibility permission (required for text pasting)
            - [Ollama](https://ollama.com) *(optional — for AI cleanup and Skills)*
          files: |
            Soll-${{ github.ref_name }}-apple-silicon.dmg
            Soll-${{ github.ref_name }}-intel.dmg
